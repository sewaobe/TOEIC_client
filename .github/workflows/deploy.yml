name: Build & Push Client Image

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/toeic-client:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/toeic-client:${{ github.sha }}

          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_CLOUDINARY_CLOUD_NAME=${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
            VITE_CLOUDINARY_UPLOAD_PRESET=${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
            VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |

            cd ~/app

            echo "Pull latest client image"
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/toeic-client:latest

            echo "Detect active client"
            ACTIVE=$(grep -o 'localhost:300[12]' /etc/nginx/sites-available/toeic)

            if [[ "$ACTIVE" == "localhost:3001" ]]; then
                NEW_COLOR="green"
                NEW_PORT="3002"
                OLD_COLOR="blue"
                OLD_PORT="3001"
            else
                NEW_COLOR="blue"
                NEW_PORT="3001"
                OLD_COLOR="green"
                OLD_PORT="3002"
            fi

            echo "Deploy client $NEW_COLOR"
            docker compose up -d client_$NEW_COLOR

            echo "Switch nginx client"
            sed -i "s/localhost:$OLD_PORT/localhost:$NEW_PORT/g" /etc/nginx/sites-available/toeic

            nginx -s reload

            echo "Stop old client"
            docker compose stop client_$OLD_COLOR
